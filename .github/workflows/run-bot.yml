name: Run Bot

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Run duration in hours (max 6)'
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  BOT_DURATION: ${{ github.event.inputs.duration || '6' }}

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Build bot
        run: go build -ldflags="-s -w" -o jurobot .

      - name: Create config
        env:
          SERVER_ADDRESS: ${{ secrets.SERVER_ADDRESS }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '25565' }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          python3 -c "
          import json, os
          cfg = {
              'server': {'address': os.environ['SERVER_ADDRESS'], 'port': int(os.environ['SERVER_PORT'])},
              'debug': {'enabled': False, 'show_chat_packets': True, 'show_raw_hex': False, 'show_json': True},
              'translation': {'enabled': True, 'target_lang': 'en', 'verbose': False},
              'sorter': {'auto_echest': True},
              'combat': {'auto_eat': True, 'auto_totem': True, 'auto_armor': True},
              'keepalive': {'enabled': True, 'health_threshold': 10, 'void_y_threshold': -50},
              'account': {'username': os.environ['BOT_USERNAME'], 'refresh_token': os.environ['REFRESH_TOKEN']}
          }
          with open('config.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Run bot
        env:
          MC_REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          MC_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          MC_XBL_TOKEN: ${{ secrets.XBL_TOKEN }}
          MC_XBL_USER_HASH: ${{ secrets.XBL_USER_HASH }}
        run: |
          echo "Starting jurobot for $BOT_DURATION hours..."
          timeout $((${BOT_DURATION} * 3600)) ./jurobot -u ${{ secrets.BOT_USERNAME }}
          echo "Bot run completed or timed out"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7
